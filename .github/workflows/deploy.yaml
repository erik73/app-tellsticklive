---
name: Deploy

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions: {}

jobs:
  ci:
    permissions:
      actions: read
      contents: write
      pull-requests: read
      packages: read
      security-events: write
    uses: erik73/workflows/.github/workflows/app-ci.yaml@33268deb018d8496ffbdb76e6da9219cebd22d50 # v1.1.0

  deploy:
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: erik73/workflows/.github/workflows/app-deploy.yaml@33268deb018d8496ffbdb76e6da9219cebd22d50 # v1.1.0
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
