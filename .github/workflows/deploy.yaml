---
name: Deploy

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions: {}

jobs:
  ci:
    permissions:
      actions: read
      contents: write
      pull-requests: read
      packages: read
      security-events: write
    uses: erik73/workflows/.github/workflows/app-ci.yaml@6e107bbfcc7007ffc686df8999a3dde510f8c251 # v2.0.2

  deploy:
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: erik73/workflows/.github/workflows/app-deploy.yaml@6e107bbfcc7007ffc686df8999a3dde510f8c251 # v2.0.2
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
